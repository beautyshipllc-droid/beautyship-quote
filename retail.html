<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Beauty Ship Express 普通会员 专属报价计算器 V5.2</title>
<style>
:root{--blue:#0969da;--dark:#0f1b2d;--muted:#667085;--line:#d9e2ef;--bg:#f3f7ff;--card:#fff;--soft:#eef5ff;--danger:#d21f52;}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#f7fbff,#eef5ff);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--dark);}
.wrap{max-width:900px;margin:0 auto;padding:18px 10px 28px} .card{background:var(--card);border:1px solid var(--line);border-radius:26px;padding:28px;box-shadow:0 18px 40px rgba(15,55,110,.08)}
h1{margin:0 0 6px;color:#003b86;font-size:34px;line-height:1.12;font-weight:900;letter-spacing:-.5px} .sub{font-size:18px;color:var(--muted);font-weight:600;margin-bottom:14px} .pill{display:inline-block;background:var(--soft);color:#0666d6;border-radius:18px;padding:9px 17px;font-weight:850;margin:0 0 22px} hr{border:0;border-top:1px solid var(--line);margin:0 0 24px}
.section-title{font-size:18px;color:#687385;font-weight:850;margin:0 0 14px} label{display:block;font-size:18px;font-weight:900;margin:0 0 8px;color:#07162d} select,input{width:100%;height:64px;border:1.5px solid var(--line);border-radius:18px;background:#fff;padding:0 18px;font-size:22px;font-weight:800;color:#07162d;outline:none} select:focus,input:focus{border-color:#7db6ff;box-shadow:0 0 0 4px rgba(9,105,218,.11)}
.routebox{margin-bottom:18px} .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 18px} .rates{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0 22px} .ratebtn{height:64px;border:1px solid #cfe0f8;background:#eef5ff;color:#0969da;border-radius:15px;font-size:24px;font-weight:950} .ratebtn.active{background:#0969da;color:#fff}
.mainbtn,.copy-main,.copy-dark{width:100%;height:74px;border:0;border-radius:18px;color:#fff;font-size:25px;font-weight:950} .mainbtn,.copy-main{background:linear-gradient(180deg,#1683f4,#0067d8);box-shadow:0 10px 24px rgba(9,105,218,.22)} .copy-dark{background:#263448;margin-top:16px}
.result{margin-top:24px;border:1px solid #cfe0f8;background:#f7fbff;border-radius:22px;padding:22px;display:none} .total-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px} .total-card{background:#fff;border:1px solid #dbe7f7;border-radius:18px;padding:18px 20px} .total-label{font-size:14px;color:#667085;font-weight:800;margin-bottom:6px} .total-rmb{font-size:36px;font-weight:1000;color:#d21f52;line-height:1} .total-usd{font-size:36px;font-weight:1000;color:#0969da;line-height:1}
.detail-table{border-top:1px solid #dbe7f7;margin-top:6px} .row{display:grid;grid-template-columns:1fr auto;gap:14px;border-bottom:1px solid #dbe7f7;padding:12px 0;font-size:17px} .row .k{color:#667085;font-weight:750} .row .v{color:#07162d;font-weight:950;text-align:right} .notice{margin-top:18px;background:#f7fbff;border-radius:14px;padding:14px;color:#667085;font-size:14px;line-height:1.65}
@media(max-width:768px){.wrap{padding:10px 8px 22px}.card{border-radius:22px;padding:22px 20px}h1{font-size:26px;white-space:normal}.sub{font-size:16px}label{font-size:14px;line-height:1.25;min-height:36px}select,input{height:54px;font-size:17px;padding:0 12px;border-radius:16px}.form-grid{grid-template-columns:1fr 1fr;gap:12px 12px}.rates{grid-template-columns:repeat(4,1fr);gap:10px}.ratebtn{height:58px;font-size:22px}.mainbtn,.copy-main,.copy-dark{height:68px;font-size:23px}.result{padding:16px}.total-grid{gap:10px}.total-card{padding:14px 12px}.total-rmb,.total-usd{font-size:29px}.row{font-size:15px;padding:10px 0}}
@media(max-width:360px){.card{padding:18px 14px}label{font-size:13px}select,input{font-size:16px;padding:0 9px}.total-rmb,.total-usd{font-size:25px}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>Beauty Ship Express 美邮购</h1>
<div class="sub">普通会员｜专属报价计算器 V5.2</div>
<div class="pill">独立报价页面</div><hr>
<div class="section-title">线路与基础信息</div>
<div class="routebox"><label>选择线路</label><select id="route"></select></div>
<div class="form-grid">
<div><label>重量 / lb</label><input id="weight" inputmode="decimal" placeholder="例如 5.2"></div>
<div><label>商品价值 / USD（可选）</label><input id="value" inputmode="decimal" value="0"></div>
<div><label>固定利润 / USD（可选）</label><input id="profitUsd" inputmode="decimal" value="0"></div>
<div><label>固定利润 / RMB（可选）</label><input id="profitRmb" inputmode="decimal" value="0"></div>
<div><label>人民币汇率</label><input id="fx" inputmode="decimal" value="7.1"></div>
<div><label>操作费 / 打包费 USD（可选）</label><input id="opFee" inputmode="decimal" value="0"></div>
</div>
<div class="rates" id="rates"></div>
<button class="mainbtn" onclick="calc()">计算报价</button>
<div class="result" id="result">
  <div class="total-grid">
    <div class="total-card"><div class="total-label">人民币总价</div><div class="total-rmb" id="rmbTotal">¥0.0</div></div>
    <div class="total-card"><div class="total-label">美元总价</div><div class="total-usd" id="usdTotal">$0.0</div></div>
  </div>
  <div class="detail-table" id="detailTable"></div>
</div>
<button class="copy-main" style="margin-top:18px" onclick="copyTotal()">复制总价</button>
<button class="copy-dark" onclick="copyWechat()">复制报价文案</button>
<div class="notice">计费规则：A/B/E/C/C1/D/H 为实际计重；W线进位取整并按2磅起；U线进位取整并按30磅起。操作费/打包费、固定利润和人民币汇率会自动记住。</div>
</div></div>
<script>
const MEMBER_TITLE="普通会员";
const VERSION='V5.2';
const ROUTES=[{"code": "A", "name": "普货/保健品/奶粉", "rate": 7.0, "minWeight": 0}, {"code": "B", "name": "衣服/鞋帽", "rate": 7.0, "minWeight": 0}, {"code": "C", "name": "二线特货/化妆品/饰品", "rate": 9.0, "minWeight": 0}, {"code": "C1", "name": "二线包包", "rate": 12.0, "minWeight": 0}, {"code": "D", "name": "液体水奶", "rate": 7.5, "minWeight": 0}, {"code": "E", "name": "鞋类", "rate": 7.5, "minWeight": 0}, {"code": "H", "name": "电子产品/胃药", "rate": 9.0, "minWeight": 0}, {"code": "U", "name": "回国个人行李", "rate": 7.5, "minWeight": 30}, {"code": "W", "name": "手表", "rate": 10.0, "minWeight": 2}];
const RATE_BTNS=[6.5,6.6,6.7,6.8,6.9,7.0,7.1,7.2];
let lastText='', lastTotal='';
function $(id){return document.getElementById(id)}
function money(n,d=1){return Number(n||0).toFixed(d)}
function num(id){const v=parseFloat($(id).value); return isNaN(v)?0:v}
function init(){
  $('route').innerHTML=ROUTES.map((r,i)=>`<option value="${i}">${r.code}｜${r.name}｜$${Number(r.rate).toFixed(2)}/lb</option>`).join('');
  $('rates').innerHTML=RATE_BTNS.map(v=>`<button class="ratebtn ${v===7.1?'active':''}" onclick="setFx(${v},this)">${v.toFixed(1)}</button>`).join('');
  ['weight','value','profitUsd','profitRmb','fx','opFee','route'].forEach(id=>{
    const key=location.pathname+'_'+id; const s=localStorage.getItem(key); if(s!==null)$(id).value=s;
    $(id).addEventListener('input',()=>{localStorage.setItem(key,$(id).value);calc(true);});
    $(id).addEventListener('change',()=>{localStorage.setItem(key,$(id).value);calc(true);});
  });
}
function setFx(v,btn){$('fx').value=v.toFixed(1);document.querySelectorAll('.ratebtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');localStorage.setItem(location.pathname+'_fx',$('fx').value);calc(true)}
function calc(silent=false){
  const r=ROUTES[parseInt($('route').value||0)]; const w=num('weight');
  const minW=r.minWeight||0; const bill=w>0?Math.max(Math.ceil(w), minW):0; const value=w>0?num('value'):0, profitUsd=w>0?num('profitUsd'):0, profitRmb=w>0?num('profitRmb'):0, fx=num('fx')||7.1, op=w>0?num('opFee'):0;
  const freight=bill*r.rate; const usdTotal=value+freight+profitUsd+op; const rmbTotal=usdTotal*fx+profitRmb;
  const mode=minW>0?`进位取整，${minW} lb起`:'实际计重';
  $('rmbTotal').innerText=`¥${money(rmbTotal)}`; $('usdTotal').innerText=`$${money(usdTotal)}`;
  const rows=[
    ['当前线路',`${r.code}｜${r.name}`],['计费模式',mode],['起步重量',`${minW||1} lb`],['实际重量',`${money(w)} lb`],['计费重量',`${bill} lb`],['运费单价',`$${money(r.rate)}/lb`],['国际运费',`$${money(freight)}`],['商品价值',`$${money(value)}`],['操作费 / 打包费',`$${money(op)}`],['固定利润/USD',`$${money(profitUsd)}`],['固定利润/RMB',`¥${money(profitRmb)}`],['人民币汇率',`${money(fx)}`]
  ];
  $('detailTable').innerHTML=rows.map(([k,v])=>`<div class="row"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
  $('result').style.display='block';
  lastTotal=`¥${money(rmbTotal)}`;
  lastText=`Beauty Ship Express 美邮购
${MEMBER_TITLE}｜专属报价计算器 ${VERSION}
线路：${r.code}｜${r.name}
实际重量：${money(w)} lb
计费重量：${bill} lb
运费单价：$${money(r.rate)}/lb
国际运费：$${money(freight)}
商品价值：$${money(value)}
操作费/打包费：$${money(op)}
固定利润/USD：$${money(profitUsd)}
固定利润/RMB：¥${money(profitRmb)}
人民币汇率：${money(fx)}
美元总价：$${money(usdTotal)}
人民币总价：¥${money(rmbTotal)}`;
  return true;
}
async function cp(t){try{await navigator.clipboard.writeText(t);alert('已复制')}catch(e){prompt('请手动复制',t)}}
function copyTotal(){if(!lastTotal){if(!calc())return;} cp(lastTotal)}
function copyWechat(){if(!lastText){if(!calc())return;} cp(lastText)}
init();
calc(true);
</script>
</body>
</html>
