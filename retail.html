<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>普通会员报价计算器</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:#f4f7fb;color:#172033}
.wrap{max-width:780px;margin:0 auto;padding:22px}
.card{background:#fff;border-radius:18px;padding:22px;box-shadow:0 8px 26px rgba(20,40,80,.08);margin-bottom:16px}
h1{font-size:24px;margin:0 0 6px}.sub{color:#637083;margin-bottom:6px}
label{display:block;font-weight:700;margin:14px 0 8px}
select,input{width:100%;box-sizing:border-box;border:1px solid #d9e1ec;border-radius:12px;padding:13px;font-size:16px;background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
button{border:0;border-radius:12px;padding:12px;font-weight:700;font-size:15px;background:#0b66c3;color:white;cursor:pointer}.quick button{background:#eef4ff;color:#0b66c3}
.result{font-size:16px;line-height:1.75;background:#f7fbff;border:1px solid #dcecff;border-radius:14px;padding:16px;white-space:pre-wrap}
.note{font-size:13px;color:#68758a;line-height:1.6}.hide{display:none}
.toggle{display:flex;gap:8px;align-items:center;margin-top:12px;color:#637083;font-size:14px}
.toggle input{width:auto}
@media(max-width:640px){.row,.row3,.quick{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="card"><h1>Beauty Ship Express</h1><div class="sub">普通会员专属报价计算器</div></div>
<div class="card">
<label>选择线路</label><select id="line"><option value="A">A-普货/保健品/奶粉 ｜ $6.50/磅</option>
<option value="B">B-服装类 ｜ $6.50/磅</option>
<option value="C">C-二线护肤品/鞋子/衣服/饰品 ｜ $9.00/磅</option>
<option value="C1">C1-包包二线【$300内】 ｜ $11.00/磅</option>
<option value="E">E-普通鞋类【一箱一双】 ｜ $7.50/磅</option>
<option value="D">D-液体水奶 ｜ $6.50/磅</option>
<option value="W">W-普通手表【$200内】 ｜ $10.00/磅</option>
<option value="H">H-小家电类/胃药 ｜ $9.50/磅</option>
<option value="U">U-回国行李 ｜ $7.50/磅</option></select>
<div class="row"><div><label>重量 / 磅</label><input id="weight" type="number" step="0.01" min="0" placeholder="例如 3.5"></div><div><label>包裹数量</label><input id="qty" type="number" step="1" min="1" value="1"></div></div>
<div class="row"><div><label>商品价值 USD / 每票</label><input id="valueUsd" type="number" step="0.01" value="0"></div><div><label>汇率</label><input id="rate" type="number" step="0.01" value="7.10"></div></div>
<div class="quick"><button onclick="setRate(6.5)">6.5</button><button onclick="setRate(6.6)">6.6</button><button onclick="setRate(6.7)">6.7</button><button onclick="setRate(6.8)">6.8</button><button onclick="setRate(6.9)">6.9</button><button onclick="setRate(7.0)">7.0</button><button onclick="setRate(7.1)">7.1</button><button onclick="setRate(7.2)">7.2</button></div>
<div class="row3"><div><label>操作费 USD / 每票</label><input id="opFee" type="number" step="0.01" value="0"></div><div><label>固定利润 USD / 每票</label><input id="fixedProfit" type="number" step="0.01" value="0"></div><div><label>每票减免/加收 USD</label><input id="adjust" type="number" step="0.01" value="0"></div></div>
<label>备注 / 可选</label><input id="memo" placeholder="例如：顺丰派送到家、仅供客户参考">
<div class="toggle"><input type="checkbox" id="showProfit" onchange="calc()"><span>显示内部利润测算</span></div>
<div id="profitBox" class="hide"><div class="row3"><div><label>成本单价 USD / 磅</label><input id="costPrice" type="number" step="0.01" value="0"></div><div><label>成本操作费 USD / 每票</label><input id="costOp" type="number" step="0.01" value="0"></div><div><label>固定成本 USD / 每票</label><input id="fixedCost" type="number" step="0.01" value="0"></div></div></div>
<div style="margin-top:18px"><button onclick="calc()" style="width:100%">计算报价</button></div>
</div>
<div class="card"><div id="result" class="result">请输入重量后点击计算。</div><div style="margin-top:12px"><button onclick="copyResult()" style="width:100%">复制报价结果</button></div></div>
<div class="card note">说明：实际计重线路按输入重量计算；进位取整线路会自动向上取整。U线、W线会自动按最低起步重量计算。商品价值仅用于客户参考报价，不自动加入运费。</div>
</div>
<script>
const MEMBER="普通会员";
const DATA={"A": {"name": "A-普货/保健品/奶粉", "min": 1, "mode": "actual", "price": 6.5}, "B": {"name": "B-服装类", "min": 1, "mode": "actual", "price": 6.5}, "C": {"name": "C-二线护肤品/鞋子/衣服/饰品", "min": 1, "mode": "actual", "price": 9.0}, "C1": {"name": "C1-包包二线【$300内】", "min": 1, "mode": "actual", "price": 11.0}, "E": {"name": "E-普通鞋类【一箱一双】", "min": 1, "mode": "actual", "price": 7.5}, "D": {"name": "D-液体水奶", "min": 1, "mode": "actual", "price": 6.5}, "W": {"name": "W-普通手表【$200内】", "min": 2, "mode": "ceil", "price": 10.0}, "H": {"name": "H-小家电类/胃药", "min": 1, "mode": "actual", "price": 9.5}, "U": {"name": "U-回国行李", "min": 30, "mode": "ceil", "price": 7.5}};
function $(id){return document.getElementById(id)}
function setRate(v){$('rate').value=v;calc()}
function money(n){return Number(n||0).toFixed(2)}
function billWeight(w,item){let bw=Math.max(Number(w)||0,item.min);if(item.mode==='ceil') bw=Math.ceil(bw);return bw}
function calc(){
  $('profitBox').className=$('showProfit').checked?'':'hide';
  const item=DATA[$('line').value]; const w=Number($('weight').value)||0; const q=Math.max(1,parseInt($('qty').value)||1); const rate=Number($('rate').value)||0;
  const valueUsd=Number($('valueUsd').value)||0, opFee=Number($('opFee').value)||0, fixedProfit=Number($('fixedProfit').value)||0, adjust=Number($('adjust').value)||0;
  if(w<=0){$('result').textContent='请输入重量。';return}
  const bw=billWeight(w,item); const freightOne=bw*item.price; const quoteOne=freightOne+opFee+fixedProfit+adjust; const quoteAll=quoteOne*q; const cnyAll=quoteAll*rate; const valueCny=valueUsd*rate;
  let text=`线路：${item.name}
会员：${MEMBER}
输入重量：${w} 磅
计费重量：${bw} 磅
单价：$${money(item.price)} / 磅
运费/每票：$${money(freightOne)}
操作费/每票：$${money(opFee)}
固定利润/每票：$${money(fixedProfit)}
减免/加收/每票：$${money(adjust)}
数量：${q} 票
美元合计：$${money(quoteAll)}
人民币参考：¥${money(cnyAll)}`;
  if(valueUsd>0) text+=`
商品价值：$${money(valueUsd)} / ¥${money(valueCny)}`;
  const memo=$('memo').value.trim(); if(memo) text+=`
备注：${memo}`;
  if($('showProfit').checked){
    const costPrice=Number($('costPrice').value)||0, costOp=Number($('costOp').value)||0, fixedCost=Number($('fixedCost').value)||0;
    const costOne=bw*costPrice+costOp+fixedCost; const costAll=costOne*q; const profitAll=quoteAll-costAll; const margin=quoteAll>0?profitAll/quoteAll*100:0;
    text+=`

【内部利润测算】
成本/每票：$${money(costOne)}
总成本：$${money(costAll)}
利润：$${money(profitAll)}
利润率：${money(margin)}%`;
  }
  $('result').textContent=text;
}
function copyResult(){navigator.clipboard.writeText($('result').innerText||$('result').textContent)}
['line','weight','qty','valueUsd','rate','opFee','fixedProfit','adjust','memo','costPrice','costOp','fixedCost'].forEach(id=>$(id).addEventListener('input',calc));
</script>
</body>
</html>
