<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Ship Express 会员专属报价系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;color:#111}.container{background:#fff;max-width:650px;width:100%;border-radius:20px;padding:40px 30px;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}.logo{font-size:32px;font-weight:800;color:#d60000;margin-bottom:10px}.subtitle{font-size:24px;font-weight:800;color:#222;margin-bottom:25px}.line{height:1px;background:#eee;margin:25px 0}.desc{color:#555;font-size:16px;line-height:1.8}.feature{text-align:left;display:inline-block;margin-top:18px;line-height:2;font-size:17px;color:#333}.member{margin-top:15px;color:#555;line-height:1.8}.contact{margin-top:20px;font-size:18px;line-height:2;font-weight:700;color:#111}.footer{margin-top:25px;color:#999;font-size:14px}@media(max-width:600px){.container{padding:34px 22px}.logo{font-size:28px}.subtitle{font-size:22px}.feature{font-size:16px}}

/* V7.6.15 copy success toast - safe */
.copy-toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%) translateY(10px);
  background:rgba(15,23,42,.92);
  color:#fff;
  padding:10px 16px;
  border-radius:14px;
  font-size:14px;
  font-weight:700;
  line-height:1;
  box-shadow:0 12px 28px rgba(15,23,42,.22);
  opacity:0;
  pointer-events:none;
  z-index:9999;
  transition:opacity .18s ease, transform .18s ease;
  white-space:nowrap;
}
.copy-toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}


/* V7.6.15 safety reminders */
.weight-alert{
  display:none;
  margin-top:8px;
  padding:9px 10px;
  border-radius:12px;
  background:#FFF7ED;
  border:1px solid #FDBA74;
  color:#C2410C;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
}
.quote-disclaimer{
  margin-top:14px;
  padding:11px 12px;
  border-radius:14px;
  background:#FFF7ED;
  border:1px solid #FDBA74;
  color:#C2410C;
  font-size:13px;
  font-weight:850;
  line-height:1.5;
}


/* V7.6.15 value and rule emphasis */
.value-alert{
  display:none;
  margin-top:8px;
  padding:9px 10px;
  border-radius:12px;
  background:#FFF7ED;
  border:1px solid #FDBA74;
  color:#C2410C;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
}
.packing-box li.rule-emphasis,
.packing-line li.rule-emphasis{
  color:#C2410C;
  font-weight:850;
}


/* V7.6.15 clear current ticket */
.clear-ticket-wrap{grid-column:1/-1;display:flex;justify-content:center;margin:2px 0 2px}
.clear-ticket-btn{height:42px;padding:0 18px;border-radius:999px;border:1px solid #CBD5E1;background:#F8FAFC;color:#475569;font-size:14px;font-weight:900;box-shadow:0 4px 12px rgba(15,55,110,.05)}
.clear-ticket-btn:active{transform:scale(.98)}
@media(max-width:768px){.clear-ticket-btn{height:38px;font-size:13px;padding:0 16px}.clear-ticket-wrap{margin:0}}


/* V7.6.15 result area: 2 rows, 3:1 money/action layout */
.result-pair{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:18px;
}
.result-row{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:10px;
  align-items:stretch;
}
.result-money{
  background:#fff;
  border:1px solid #dbe7f7;
  border-radius:18px;
  padding:15px 14px;
  min-height:88px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
}
.result-action{
  border-radius:18px;
  min-height:88px;
  padding:10px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.12;
  font-size:16px;
  font-weight:1000;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(15,55,110,.06);
}
.copy-result-action{
  background:#EFF6FF;
  border:1px solid #BFDBFE;
  color:#DC2626;
}
.clear-result-action{background:#EFF6FF;border:1px solid #BFDBFE;color:#DC2626;}
.result-action:active{transform:scale(.98)}
@media(max-width:768px){
  .result-pair{gap:8px;margin-bottom:16px}
  .result-row{grid-template-columns:3fr 1fr;gap:8px}
  .result-money{min-height:76px;padding:12px 10px}
  .result-action{min-height:76px;font-size:15px;border-radius:16px}
  .total-rmb,.total-usd{font-size:28px}
}
@media(max-width:360px){
  .result-row{gap:6px}
  .result-money{padding:10px 8px}
  .result-action{font-size:14px}
  .total-rmb,.total-usd{font-size:25px}
}


/* V7.6.15 result area compact adjustment */
.result-pair{
  gap:8px !important;
  margin-bottom:14px !important;
}
.result-row{
  grid-template-columns:3fr 1fr !important;
  gap:8px !important;
}
.result-money{
  min-height:68px !important;
  padding:10px 14px !important;
  border-radius:16px !important;
}
.result-action{
  min-height:68px !important;
  padding:8px 6px !important;
  border-radius:16px !important;
  font-size:15px !important;
  line-height:1.12 !important;
}
.copy-result-action,
.clear-result-action{
  background:#EFF6FF !important;
  border:1px solid #BFDBFE !important;
  color:#DC2626 !important;
}
.total-label{
  margin-bottom:4px !important;
}
.total-rmb,.total-usd{
  line-height:1.05 !important;
}
@media(max-width:768px){
  .result-pair{gap:7px !important;margin-bottom:12px !important;}
  .result-row{gap:7px !important;}
  .result-money{min-height:62px !important;padding:9px 10px !important;border-radius:15px !important;}
  .result-action{min-height:62px !important;font-size:14px !important;border-radius:15px !important;}
  .total-rmb,.total-usd{font-size:26px !important;}
}
@media(max-width:360px){
  .result-row{gap:6px !important;}
  .result-money{min-height:58px !important;padding:8px 8px !important;}
  .result-action{min-height:58px !important;font-size:13px !important;}
  .total-rmb,.total-usd{font-size:24px !important;}
}


/* V7.6.15: label text adjustment */
.label-stack{
  display:block;
  line-height:1.18;
}
.label-stack .label-main{
  display:block;
}
.label-stack .label-sub{
  display:block;
  margin-top:2px;
  font-size:14px;
  font-weight:850;
  color:#334155;
}
@media(max-width:768px){
  .label-stack .label-sub{
    font-size:13px;
  }
}


/* V7.6.15: all route packing rules always visible, no capsule */
.all-rules-section{
  margin-top:12px;
  margin-bottom:12px;
  background:#fff;
  border:1px solid #dbe7f7;
  border-radius:18px;
  padding:14px 12px 12px;
  box-shadow:0 8px 22px rgba(15,55,110,.06);
}
.all-rules-title{
  margin:0 0 12px;
  text-align:center;
  font-size:18px;
  line-height:1.25;
  font-weight:1000;
  color:#0f172a;
}
.all-rules-section .packing-all-body{
  padding:0 !important;
  background:transparent !important;
  border:0 !important;
  border-radius:0 !important;
  box-shadow:none !important;
  max-height:none !important;
  overflow:visible !important;
}
.all-rules-section .packing-line{
  background:#fbfdff;
}
@media(max-width:768px){
  .all-rules-section{
    padding:13px 10px 11px;
    border-radius:16px;
  }
  .all-rules-title{
    font-size:17px;
    margin-bottom:10px;
  }
}


/* V7.6.15: all route packing rules default open, can manually collapse */
.all-rules-section{
  margin-top:12px !important;
  margin-bottom:12px !important;
  background:#fff !important;
  border:1px solid #dbe7f7 !important;
  border-radius:18px !important;
  padding:14px 12px 12px !important;
  box-shadow:0 8px 22px rgba(15,55,110,.06) !important;
}
.all-rules-section summary{
  list-style:none;
  cursor:pointer;
  user-select:none;
  text-align:center;
  margin:0 0 12px;
}
.all-rules-section summary::-webkit-details-marker{
  display:none;
}
.all-rules-title{
  margin:0;
  text-align:center;
  font-size:18px;
  line-height:1.25;
  font-weight:1000;
  color:#0f172a;
}
.all-rules-hint{
  display:block;
  margin-top:4px;
  font-size:13px;
  font-weight:800;
  color:#64748b;
}
.all-rules-section .packing-all-body{
  padding:0 !important;
  background:transparent !important;
  border:0 !important;
  border-radius:0 !important;
  box-shadow:none !important;
  max-height:none !important;
  overflow:visible !important;
}
.all-rules-section .packing-line{
  background:#fbfdff;
}
@media(max-width:768px){
  .all-rules-section{
    padding:13px 10px 11px !important;
    border-radius:16px !important;
  }
  .all-rules-title{
    font-size:17px !important;
  }
  .all-rules-hint{
    font-size:12px !important;
  }
}


/* V7.6.15: exchange rate label hint */
.label-hint{
  margin-left:6px;
  font-size:13px;
  font-weight:700;
  color:#94A3B8;
  white-space:nowrap;
}
@media(max-width:768px){
  .label-hint{
    display:block;
    margin-left:0;
    margin-top:2px;
    font-size:12px;
  }
}


/* V7.6.15: route select hint and darker arrow */
.route-select-hint{
  margin-left:6px;
  font-size:13px;
  font-weight:800;
  color:#94A3B8;
  white-space:nowrap;
}
select#route{
  color:#020617;
  background-image:
    linear-gradient(45deg, transparent 50%, #0F172A 50%),
    linear-gradient(135deg, #0F172A 50%, transparent 50%);
  background-position:
    calc(100% - 18px) 50%,
    calc(100% - 12px) 50%;
  background-size:6px 6px, 6px 6px;
  background-repeat:no-repeat;
  padding-right:38px;
  appearance:none;
  -webkit-appearance:none;
}
@media(max-width:768px){
  .route-select-hint{
    display:block;
    margin-left:0;
    margin-top:2px;
    font-size:12px;
  }
}

</style>
