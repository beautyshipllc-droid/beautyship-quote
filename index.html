<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Ship Express 会员专属报价系统</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    .page {
      min-height: 100vh;
      padding: 28px 14px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 28px;
      padding: 34px 22px 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .header {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid #e5e7eb;
    }

    .brand {
      font-size: 30px;
      font-weight: 900;
      color: #d92d20;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 19px;
      font-weight: 800;
      color: #6b7280;
    }

    .section {
      padding: 26px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .section:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto 18px;
      font-size: 22px;
      font-weight: 900;
      color: #111827;
    }

    .section-icon {
      width: 38px;
      height: 38px;
      min-width: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eff6ff;
      border-radius: 12px;
      font-size: 22px;
    }

    .list {
      max-width: 480px;
      margin: 0 auto;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 14px 0;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.4;
      color: #374151;
    }

    .row-icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f7ff;
      border: 1px solid #e3ecff;
      border-radius: 14px;
      font-size: 22px;
    }

    .member-grid {
      max-width: 480px;
      margin: 2px auto 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .member {
      padding: 14px 10px;
      text-align: center;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 19px;
      font-weight: 900;
      color: #1f2937;
    }

    .note {
      max-width: 500px;
      margin: 20px auto 0;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.75;
      color: #6b7280;
    }

    .highlight {
      max-width: 500px;
      margin: 0 auto;
      padding: 22px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #ffffff;
      text-align: center;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    .highlight-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .highlight-sub {
      font-size: 17px;
      font-weight: 700;
      opacity: 0.96;
      line-height: 1.6;
    }

    .contact-box {
      max-width: 500px;
      margin: 0 auto;
      padding: 22px 18px;
      border-radius: 20px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      text-align: center;
    }

    .contact-title {
      font-size: 21px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 16px;
    }

    .contact-line {
      font-size: 24px;
      font-weight: 900;
      color: #111827;
      margin: 12px 0;
      line-height: 1.35;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 24px;
        padding: 30px 18px 24px;
      }

      .brand {
        font-size: 27px;
      }

      .title {
        font-size: 24px;
      }

      .subtitle {
        font-size: 18px;
      }

      .section-title {
        font-size: 20px;
      }

      .row {
        font-size: 18px;
      }

      .member {
        font-size: 17px;
      }

      .highlight-title {
        font-size: 22px;
      }

      .contact-line {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">

      <header class="header">
        <div class="brand">Beauty Ship Express</div>
        <div class="title">会员专属报价系统</div>
        <div class="subtitle">美国 → 中国空运专线</div>
      </header>

      <section class="section">
        <div class="section-title">
          <div class="section-icon">📦</div>
          <div>主要功能</div>
        </div>

        <div class="list">
          <div class="row">
            <div class="row-icon">💵</div>
            <div>国际运费快速计算</div>
          </div>

          <div class="row">
            <div class="row-icon">🛍️</div>
            <div>海淘代购报价计算</div>
          </div>

          <div class="row">
            <div class="row-icon">📋</div>
            <div>客户报价单快速生成</div>
          </div>

          <div class="row">
            <div class="row-icon">📱</div>
            <div>支持手机与电脑使用</div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <div class="section-icon">👑</div>
          <div>会员等级报价</div>
        </div>

        <div class="member-grid">
          <div class="member">普通会员</div>
          <div class="member">VIP1会员</div>
          <div class="member">VIP2会员</div>
          <div class="member">VIP3会员</div>
        </div>

        <div class="note">
          根据会员等级自动匹配对应报价，<br>
          帮助您快速完成运费查询与客户报价。
        </div>
      </section>

      <section class="section">
        <div class="highlight">
          <div class="highlight-title">
            自己查运费 · 给客户报价<br>
            一个工具即可完成
          </div>
          <div class="highlight-sub">
            手机随时打开，报价更快更方便
          </div>
        </div>
      </section>

      <section class="section">
        <div class="contact-box">
          <div class="contact-title">获取专属报价链接请联系</div>

          <div class="contact-line">微信：Beautyshipllc</div>
          <div class="contact-line">电话：916-718-9551</div>
        </div>

        <div class="footer">
          北加州实体门店 · 美国直发中国
        </div>
      </section>

    </section>
  </main>
</body>
</html>
