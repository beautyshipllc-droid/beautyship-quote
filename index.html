<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Ship Express 会员专属报价系统</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    .page {
      min-height: 100vh;
      padding: 28px 14px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 28px;
      padding: 36px 22px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
      text-align: center;
    }

    .brand {
      font-size: 30px;
      font-weight: 900;
      color: #d92d20;
      margin-bottom: 12px;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 19px;
      font-weight: 800;
      color: #6b7280;
    }

    .section {
      padding: 28px 0;
      border-top: 1px solid #e5e7eb;
    }

    .section-title {
      font-size: 23px;
      font-weight: 900;
      margin-bottom: 22px;
    }

    .feature {
      font-size: 20px;
      font-weight: 800;
      color: #374151;
      margin: 18px 0;
      line-height: 1.45;
    }

    .member-grid {
      max-width: 500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .member {
      padding: 15px 10px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 19px;
      font-weight: 900;
    }

    .note {
      margin: 22px auto 0;
      max-width: 500px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.75;
      color: #6b7280;
    }

    .highlight {
      margin: 0 auto;
      max-width: 500px;
      padding: 24px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff;
      box-shadow: 0 10px 24px rgba(37,99,235,.22);
    }

    .highlight-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.55;
    }

    .contact-box {
      max-width: 500px;
      margin: 0 auto;
      padding: 24px 18px;
      border-radius: 20px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .contact-title {
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .contact-line {
      font-size: 24px;
      font-weight: 900;
      margin: 12px 0;
    }

    .footer {
      margin-top: 22px;
      font-size: 16px;
      font-weight: 800;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .brand { font-size: 27px; }
      .title { font-size: 24px; }
      .subtitle { font-size: 18px; }
      .section-title { font-size: 21px; }
      .feature { font-size: 18px; }
      .member { font-size: 17px; }
      .highlight-title { font-size: 22px; }
      .contact-line { font-size: 22px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">

      <div class="brand">Beauty Ship Express</div>
      <div class="title">会员专属报价系统</div>
      <div class="subtitle">美国 → 中国空运专线</div>

      <section class="section">
        <div class="section-title">📦 主要功能</div>
        <div class="feature">💵 国际运费快速计算</div>
        <div class="feature">🛍️ 海淘代购报价计算</div>
        <div class="feature">📋 客户报价单快速生成</div>
        <div class="feature">📱 支持手机与电脑使用</div>
      </section>

      <section class="section">
        <div class="section-title">👑 会员等级报价</div>

        <div class="member-grid">
          <div class="member">普通会员</div>
          <div class="member">VIP1会员</div>
          <div class="member">VIP2会员</div>
          <div class="member">VIP3会员</div>
        </div>

        <div class="note">
          根据会员等级自动匹配对应报价，<br>
          帮助您快速完成运费查询与客户报价。
        </div>
      </section>

      <section class="section">
        <div class="highlight">
          <div class="highlight-title">
            自己查运费 · 给客户报价<br>
            一个工具即可完成
          </div>
        </div>
      </section>

      <section class="section">
        <div class="contact-box">
          <div class="contact-title">获取专属报价链接请联系</div>
          <div class="contact-line">微信：Beautyshipllc</div>
          <div class="contact-line">电话：916-718-9551</div>
        </div>

        <div class="footer">北加州实体门店 · 美国直发中国</div>
      </section>

    </section>
  </main>
</body>
</html>
