<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Ship Express 会员专属报价系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;color:#111}.container{background:#fff;max-width:650px;width:100%;border-radius:20px;padding:40px 30px;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}.logo{font-size:32px;font-weight:800;color:#d60000;margin-bottom:10px}.subtitle{font-size:24px;font-weight:800;color:#222;margin-bottom:25px}.line{height:1px;background:#eee;margin:25px 0}.desc{color:#555;font-size:16px;line-height:1.8}.feature{text-align:left;display:inline-block;margin-top:18px;line-height:2;font-size:17px;color:#333}.member{margin-top:15px;color:#555;line-height:1.8}.contact{margin-top:20px;font-size:18px;line-height:2;font-weight:700;color:#111}.footer{margin-top:25px;color:#999;font-size:14px}@media(max-width:600px){.container{padding:34px 22px}.logo{font-size:28px}.subtitle{font-size:22px}.feature{font-size:16px}}

/* V7.6.2 copy success toast - safe */
.copy-toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%) translateY(10px);
  background:rgba(15,23,42,.92);
  color:#fff;
  padding:10px 16px;
  border-radius:14px;
  font-size:14px;
  font-weight:700;
  line-height:1;
  box-shadow:0 12px 28px rgba(15,23,42,.22);
  opacity:0;
  pointer-events:none;
  z-index:9999;
  transition:opacity .18s ease, transform .18s ease;
  white-space:nowrap;
}
.copy-toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}


/* V7.6.2 safety reminders */
.weight-alert{
  display:none;
  margin-top:8px;
  padding:9px 10px;
  border-radius:12px;
  background:#FFF7ED;
  border:1px solid #FDBA74;
  color:#C2410C;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
}
.quote-disclaimer{
  margin-top:14px;
  padding:11px 12px;
  border-radius:14px;
  background:#FFF7ED;
  border:1px solid #FDBA74;
  color:#C2410C;
  font-size:13px;
  font-weight:850;
  line-height:1.5;
}


/* V7.6.2 value and rule emphasis */
.value-alert{
  display:none;
  margin-top:8px;
  padding:9px 10px;
  border-radius:12px;
  background:#FFF7ED;
  border:1px solid #FDBA74;
  color:#C2410C;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
}
.packing-box li.rule-emphasis,
.packing-line li.rule-emphasis{
  color:#C2410C;
  font-weight:850;
}


/* V7.6.2 clear current ticket */
.clear-ticket-wrap{grid-column:1/-1;display:flex;justify-content:center;margin:2px 0 2px}
.clear-ticket-btn{height:42px;padding:0 18px;border-radius:999px;border:1px solid #CBD5E1;background:#F8FAFC;color:#475569;font-size:14px;font-weight:900;box-shadow:0 4px 12px rgba(15,55,110,.05)}
.clear-ticket-btn:active{transform:scale(.98)}
@media(max-width:768px){.clear-ticket-btn{height:38px;font-size:13px;padding:0 16px}.clear-ticket-wrap{margin:0}}

</style>
</head>
<body>
<div class="container">
  <div class="logo">Beauty Ship Express</div>
  <div class="subtitle">会员专属报价系统</div>
  <div class="desc">美国 → 中国空运专线</div>
  <div class="line"></div>
  <div class="desc">🎯 会员专属工具</div>
  <div class="feature">
    📦 国际运费报价计算<br>
    💰 海淘代购报价计算<br>
    📋 客户报价单快速生成<br>
    📱 支持手机与电脑使用
  </div>
  <div class="member">根据发货频率与月发货量，<br>我们为会员客户提供专属运价方案与报价系统。</div>
  <div class="line"></div>
  <div class="desc">当前页面仅为系统入口。<br>请联系客户经理获取您的专属报价链接。</div>
  <div class="contact">📱 微信：Beautyshipllc<br>📞 916-718-9551</div>
  <div class="footer">北加州实体门店 · 美国直发中国</div>
</div>
</body>
</html>
