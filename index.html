<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Ship Express 会员专属报价系统</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef2f7 100%);
      color: #222;
    }

    .page {
      min-height: 100vh;
      padding: 40px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 30px;
      padding: 42px 28px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.06);
    }

    .header {
      text-align: center;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      color: #d8322a;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      color: #222;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: 800;
      color: #666;
      margin-bottom: 30px;
    }

    .divider {
      height: 1px;
      background: #e9e9e9;
      margin: 30px 0;
    }

    .section-title {
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      color: #444;
      margin-bottom: 24px;
    }

    .features-box {
      max-width: 520px;
      margin: 0 auto;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 22px;
      font-weight: 800;
      color: #333;
      margin: 18px 0;
      line-height: 1.4;
    }

    .icon {
      width: 34px;
      min-width: 34px;
      text-align: center;
      font-size: 24px;
    }

    .desc-box {
      margin: 34px auto 0;
      max-width: 560px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: #666;
      line-height: 1.8;
    }

    .highlight-box {
      margin: 34px auto 0;
      max-width: 560px;
      text-align: center;
      font-size: 25px;
      font-weight: 900;
      color: #1d4ed8;
      line-height: 1.7;
    }

    .contact-box {
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    .contact-title {
      font-size: 24px;
      font-weight: 900;
      color: #444;
      line-height: 1.7;
      margin-bottom: 26px;
    }

    .contact-item {
      font-size: 28px;
      font-weight: 900;
      color: #222;
      margin: 16px 0;
      line-height: 1.4;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 20px;
      font-weight: 800;
      color: #aaaaaa;
    }

    @media (max-width: 480px) {
      .page {
        padding: 28px 12px;
      }

      .card {
        border-radius: 26px;
        padding: 36px 22px;
      }

      .brand {
        font-size: 28px;
      }

      .title {
        font-size: 25px;
      }

      .subtitle {
        font-size: 19px;
      }

      .section-title {
        font-size: 21px;
      }

      .feature-item {
        font-size: 18px;
        gap: 12px;
        margin: 16px 0;
      }

      .icon {
        width: 30px;
        min-width: 30px;
        font-size: 21px;
      }

      .desc-box {
        font-size: 18px;
      }

      .highlight-box {
        font-size: 21px;
      }

      .contact-title {
        font-size: 20px;
      }

      .contact-item {
        font-size: 23px;
      }

      .footer {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">

      <div class="header">
        <div class="brand">Beauty Ship Express</div>
        <div class="title">会员专属报价系统</div>
        <div class="subtitle">美国 → 中国空运专线</div>
      </div>

      <div class="divider"></div>

      <div class="section-title">🎯 欢迎使用在线报价工具</div>

      <div class="features-box">
        <div class="feature-item">
          <span class="icon">📦</span>
          <span>国际运费快速计算</span>
        </div>

        <div class="feature-item">
          <span class="icon">💰</span>
          <span>海淘代购报价计算</span>
        </div>

        <div class="feature-item">
          <span class="icon">📋</span>
          <span>客户报价单快速生成</span>
        </div>

        <div class="feature-item">
          <span class="icon">📱</span>
          <span>支持手机与电脑使用</span>
        </div>

        <div class="feature-item">
          <span class="icon">👑</span>
          <span>普通会员 / VIP1 / VIP2 / VIP3</span>
        </div>
      </div>

      <div class="desc-box">
        根据会员等级自动匹配对应报价，<br>
        帮助您快速完成运费查询与客户报价。
      </div>

      <div class="highlight-box">
        自己查运费 · 给客户报价<br>
        一个工具即可完成
      </div>

      <div class="divider"></div>

      <div class="contact-box">
        <div class="contact-title">
          请联系客户经理<br>
          获取您的专属报价链接
        </div>

        <div class="contact-item">
          📱 微信：Beautyshipllc
        </div>

        <div class="contact-item">
          ☎️ 916-718-9551
        </div>
      </div>

      <div class="footer">
        北加州实体门店 · 美国直发中国
      </div>

    </section>
  </main>
</body>
</html>
